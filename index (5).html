<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Portfolio | IS 537 BYU</title>
<script src="data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #4f8ef7;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e2e8f0;
    --muted: #6b7a9a;
    --easy: #34d399;
    --med: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* ── HERO ── */
  .hero {
    padding: 80px 0 60px;
    text-align: center;
  }

  .hero-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 4px;
    padding: 4px 12px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .hero h1 {
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #e2e8f0 0%, #4f8ef7 50%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 300;
    margin-bottom: 40px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 560px;
    margin: 0 auto 48px;
    background: var(--surface);
  }

  .stat {
    flex: 1;
    padding: 18px 12px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-val {
    font-size: 1.6rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
  }
  .stat-val.blue   { color: var(--accent); }
  .stat-val.green  { color: var(--easy); }
  .stat-val.yellow { color: var(--med); }

  .stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  .about-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 56px;
    line-height: 1.7;
    color: #c4cde0;
    font-size: 0.95rem;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .about-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── ACCORDION ── */
  .topic-group {
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .topic-group:hover { border-color: rgba(79,142,247,0.3); }

  .topic-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    cursor: pointer;
    background: var(--surface);
    user-select: none;
    transition: background 0.2s;
    gap: 16px;
  }
  .topic-header:hover { background: var(--surface2); }

  .topic-left { display: flex; align-items: center; gap: 14px; }

  .topic-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
  }

  .topic-name  { font-weight: 600; font-size: 0.95rem; }
  .topic-count { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  .topic-right { display: flex; align-items: center; gap: 12px; }

  .diff-pills { display: flex; gap: 6px; }
  .pill {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .pill.easy   { background: rgba(52,211,153,0.12); color: var(--easy); }
  .pill.medium { background: rgba(245,158,11,0.12);  color: var(--med);  }

  .chevron {
    width: 20px; height: 20px;
    color: var(--muted);
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .topic-group.open .chevron { transform: rotate(180deg); }

  .topic-body {
    display: none;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }
  .topic-group.open .topic-body { display: block; }

  /* ── PROBLEM ── */
  .problem { border-bottom: 1px solid var(--border); }
  .problem:last-child { border-bottom: none; }

  .problem-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 12px;
  }
  .problem-header:hover { background: var(--surface); }

  .problem-num   { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); min-width: 32px; }
  .problem-title { font-size: 0.9rem; font-weight: 500; flex: 1; }
  .problem-diff  { font-size: 0.68rem; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 20px; }
  .problem-diff.easy   { background: rgba(52,211,153,0.1); color: var(--easy); }
  .problem-diff.medium { background: rgba(245,158,11,0.1);  color: var(--med);  }

  .problem-chevron { width: 16px; height: 16px; color: var(--muted); transition: transform 0.25s; flex-shrink: 0; }
  .problem.open .problem-chevron { transform: rotate(180deg); }

  .problem-body { display: none; padding: 0 24px 24px; }
  .problem.open .problem-body { display: block; }

  .p-summary {
    font-size: 0.88rem;
    color: #b0bcd4;
    line-height: 1.65;
    margin-bottom: 20px;
    padding-top: 4px;
  }

  .p-meta { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
  .p-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .p-meta-key  { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-family: 'DM Mono', monospace; }
  .p-meta-val  { font-size: 0.82rem; font-family: 'DM Mono', monospace; color: var(--accent); }

  .p-section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; }

  .p-approach { font-size: 0.88rem; color: #b0bcd4; line-height: 1.65; margin-bottom: 20px; }

  .p-insight {
    background: rgba(79,142,247,0.07);
    border-left: 2px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: #c4d0e8;
    line-height: 1.55;
    margin-bottom: 20px;
    font-style: italic;
  }

  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    overflow-x: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #c4d0e8;
    tab-size: 4;
    white-space: pre;
  }

  footer {
    text-align: center;
    padding: 48px 0 32px;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 600px) {
    .diff-pills { display: none; }
    .stats-bar  { flex-wrap: wrap; }
    .stat       { min-width: 50%; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-tag" id="hero-tag"></div>
    <h1>DSA Portfolio</h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="stats-bar" id="stats-bar"></div>
  </div>
  <div class="about-card" id="about-card"></div>
  <div class="section-label">Problems by Topic</div>
  <div id="topics"></div>
</div>

<footer id="footer"></footer>

<script>
// ── Chevron SVG ──────────────────────────────────────────────────────────────
const chevronSVG = (cls) =>
  `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="6 9 12 15 18 9"/>
  </svg>`;

// ── Escape HTML (for code blocks) ────────────────────────────────────────────
function esc(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Topic icon background colors ─────────────────────────────────────────────
const iconColors = [
  'rgba(79,142,247,0.12)',
  'rgba(167,139,250,0.12)',
  'rgba(52,211,153,0.12)',
  'rgba(245,158,11,0.12)',
  'rgba(248,113,113,0.12)',
  'rgba(99,102,241,0.12)',
  'rgba(52,211,153,0.10)',
  'rgba(34,211,153,0.10)',
];

// ── Render hero ──────────────────────────────────────────────────────────────
document.getElementById('hero-tag').textContent = PORTFOLIO.course;
document.getElementById('hero-sub').textContent =
  `${PORTFOLIO.name} · ${PORTFOLIO.semester} · ${PORTFOLIO.language}`;

const { total, easy, medium, acceptance } = PORTFOLIO.stats;
document.getElementById('stats-bar').innerHTML = `
  <div class="stat"><div class="stat-val blue">${total}</div><div class="stat-label">Problems Solved</div></div>
  <div class="stat"><div class="stat-val green">${easy}</div><div class="stat-label">Easy</div></div>
  <div class="stat"><div class="stat-val yellow">${medium}</div><div class="stat-label">Medium</div></div>
  <div class="stat"><div class="stat-val blue">${acceptance}</div><div class="stat-label">Acceptance</div></div>
`;

document.getElementById('about-card').innerHTML = PORTFOLIO.about;

// ── Render footer ────────────────────────────────────────────────────────────
document.getElementById('footer').innerHTML = `
  <div class="container">
    ${PORTFOLIO.name} &nbsp;·&nbsp; IS 537 Data Structures &nbsp;·&nbsp; BYU Provo &nbsp;·&nbsp; ${PORTFOLIO.semester}<br>
    <span style="color:#2d3748;margin-top:6px;display:block;">
      ${total} problems solved &nbsp;·&nbsp; ${acceptance} acceptance rate &nbsp;·&nbsp; ${PORTFOLIO.language}
    </span>
  </div>`;

// ── Render topics ────────────────────────────────────────────────────────────
const topicsEl = document.getElementById('topics');

PORTFOLIO.topics.forEach((topic, ti) => {
  const easyCount = topic.problems.filter(p => p.difficulty === 'Easy').length;
  const medCount  = topic.problems.filter(p => p.difficulty === 'Medium').length;

  const pillsHTML = [
    easyCount ? `<span class="pill easy">${easyCount} Easy</span>` : '',
    medCount  ? `<span class="pill medium">${medCount} Med</span>` : '',
  ].join('');

  const problemsHTML = topic.problems.map(p => {
    const diffClass = p.difficulty.toLowerCase();
    return `
      <div class="problem">
        <div class="problem-header" onclick="toggleProblem(this)">
          <span class="problem-num">#${p.num}</span>
          <span class="problem-title">${p.title}</span>
          <span class="problem-diff ${diffClass}">${p.difficulty}</span>
          ${chevronSVG('problem-chevron')}
        </div>
        <div class="problem-body">
          <p class="p-summary">${p.summary}</p>
          <div class="p-meta">
            <div class="p-meta-item">
              <span class="p-meta-key">Time</span>
              <span class="p-meta-val">${p.time}</span>
            </div>
            <div class="p-meta-item">
              <span class="p-meta-key">Space</span>
              <span class="p-meta-val">${p.space}</span>
            </div>
            <div class="p-meta-item">
              <span class="p-meta-key">Technique</span>
              <span class="p-meta-val">${p.technique}</span>
            </div>
          </div>
          <div class="p-section-title">Approach</div>
          <p class="p-approach">${p.approach}</p>
          <div class="p-insight">${p.insight}</div>
          <div class="p-section-title">Solution</div>
          <pre>${esc(p.code)}</pre>
        </div>
      </div>`;
  }).join('');

  const groupHTML = `
    <div class="topic-group" id="${topic.id}">
      <div class="topic-header" onclick="toggleGroup(this)">
        <div class="topic-left">
          <div class="topic-icon" style="background:${iconColors[ti % iconColors.length]}">${topic.icon}</div>
          <div>
            <div class="topic-name">${topic.name}</div>
            <div class="topic-count">${topic.problems.length} problem${topic.problems.length !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="topic-right">
          <div class="diff-pills">${pillsHTML}</div>
          ${chevronSVG('chevron')}
        </div>
      </div>
      <div class="topic-body">${problemsHTML}</div>
    </div>`;

  topicsEl.insertAdjacentHTML('beforeend', groupHTML);
});

// ── Accordion logic ──────────────────────────────────────────────────────────
function toggleGroup(header) {
  header.closest('.topic-group').classList.toggle('open');
}
function toggleProblem(header) {
  header.closest('.problem').classList.toggle('open');
}
</script>
</body>
</html>
